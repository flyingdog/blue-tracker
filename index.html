<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blue Tracker</title>
  <meta name="description" content="Suivi de tâches multi-clients et multi-projets — blue-erp.com">
  <meta name="theme-color" content="#185FA5">

  <!-- Favicon inline SVG -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23185FA5'/><text x='16' y='22' text-anchor='middle' fill='white' font-size='18' font-family='system-ui' font-weight='700'>B</text></svg>">

  <link rel="stylesheet" href="css/style.css?v=10">

  <!-- Google Identity Services (optionnel, pour Drive) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
<div id="app">

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header class="app-header">
    <div class="app-logo">
      <svg width="22" height="22" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect width="32" height="32" rx="6" fill="white" fill-opacity="0.2"/>
        <text x="16" y="22" text-anchor="middle" fill="white" font-size="18" font-family="system-ui" font-weight="700">B</text>
      </svg>
      Blue Tracker
      <span>blue-erp.com</span>
    </div>

    <div class="view-switcher" role="group" aria-label="Vue">
      <button class="view-btn active" data-view="list"      aria-pressed="true">≡ Liste</button>
      <button class="view-btn"        data-view="kanban"    aria-pressed="false">⊞ Kanban</button>
      <button class="view-btn"        data-view="hierarchy" aria-pressed="false">⊟ Hiérarchie</button>
    </div>

    <div class="header-spacer"></div>

    <div class="header-actions">
      <button id="add-task-btn"       class="btn-header primary" title="Nouvelle tâche">+ Tâche</button>
      <button id="add-project-btn"    class="btn-header"         title="Nouveau projet">+ Projet</button>
      <button id="add-client-btn"     class="btn-header"         title="Nouveau client">+ Client</button>
      <button id="manage-deliverables-btn" class="btn-header"   title="Gérer les livrables">📦 Livrables</button>
      <button id="auth-btn"           aria-label="Connexion Google Drive">☁ Drive</button>
    </div>
  </header>

  <!-- ── Filter bar ─────────────────────────────────────────────────────── -->
  <div class="filter-bar" role="search" aria-label="Filtres">
    <select id="filter-client"   aria-label="Filtrer par client">
      <option value="">Tous les clients</option>
    </select>
    <select id="filter-project"  aria-label="Filtrer par projet">
      <option value="">Tous les projets</option>
    </select>
    <select id="filter-category" aria-label="Filtrer par catégorie">
      <option value="">Toutes les catégories</option>
      <option>Atelier</option>
      <option>Spec</option>
      <option>Investigation</option>
      <option>Données</option>
      <option>Admin</option>
      <option>Réunion</option>
      <option>Autre</option>
    </select>
    <select id="filter-priority" aria-label="Filtrer par priorité">
      <option value="">Toutes priorités</option>
      <option>Haute</option>
      <option>Moyenne</option>
      <option>Basse</option>
    </select>
    <select id="filter-status"   aria-label="Filtrer par statut">
      <option value="">Tous les statuts</option>
      <option>À faire</option>
      <option>En cours</option>
      <option>Bloqué</option>
      <option>Terminé</option>
    </select>
    <input  id="filter-search"   type="text" placeholder="Rechercher…" aria-label="Recherche textuelle">
    <button id="filter-reset"    class="filter-reset" title="Réinitialiser les filtres">✕ Réinitialiser</button>
  </div>

  <!-- ── Options barre liste ───────────────────────────────────────────── -->
  <div id="list-options-bar" class="list-options-bar hidden">
    <div class="list-opt-section">
      <label class="list-opt-label">Grouper</label>
      <select id="opt-group-by">
        <option value="">— Aucun —</option>
        <option value="client">Client</option>
        <option value="project">Projet</option>
        <option value="status">Statut</option>
        <option value="category">Catégorie</option>
        <option value="priority">Priorité</option>
      </select>
    </div>
    <div class="list-opt-section">
      <label class="list-opt-label">Trier</label>
      <select id="opt-sort-by">
        <option value="deadline">Deadline</option>
        <option value="priority">Priorité</option>
        <option value="status">Statut</option>
        <option value="name">Nom</option>
        <option value="client">Client</option>
        <option value="project">Projet</option>
      </select>
      <button id="opt-sort-dir" class="sort-dir-btn" title="Inverser le tri">↑</button>
    </div>
    <div class="list-opt-sep"></div>
    <div class="list-opt-section list-opt-cols">
      <label class="list-opt-label">Colonnes</label>
      <label class="col-toggle"><input type="checkbox" data-col="client"      checked> Client</label>
      <label class="col-toggle"><input type="checkbox" data-col="project"     checked> Projet</label>
      <label class="col-toggle"><input type="checkbox" data-col="deliverable" checked> Livrable</label>
      <label class="col-toggle"><input type="checkbox" data-col="category"    checked> Catégorie</label>
      <label class="col-toggle"><input type="checkbox" data-col="priority"    checked> Priorité</label>
      <label class="col-toggle"><input type="checkbox" data-col="deadline"    checked> Deadline</label>
    </div>
  </div>

  <!-- ── View container ─────────────────────────────────────────────────── -->
  <main class="app-main" id="view-container" aria-live="polite">
    <!-- Rendered by JS -->
  </main>

</div>

<!-- ── Modal overlay ──────────────────────────────────────────────────────── -->
<div id="modal-overlay" class="hidden" role="dialog" aria-modal="true"></div>

<script src="js/storage.js"></script>
<script src="js/views.js"></script>
<script src="js/app.js"></script>
</body>
</html>
